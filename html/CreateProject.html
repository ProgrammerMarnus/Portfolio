<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Project</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black">

  <!-- Header Section - White -->
  <header class="bg-black shadow fixed w-full z-10">
    <nav class="max-w-6xl mx-auto px-4 py-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-white">Marnus Du Toit</h1>
        <ul class="flex gap-8">
          <li><a href="#create" class="text-white hover:text-gray-900">Create Project</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <!-- Hero Section - Spring/Orange/Yellow/Green -->
  <section class="bg-gradient-to-r from-green-400 via-yellow-300 to-orange-400 py-20">
    <div class="max-w-6xl mx-auto px-4 text-center">
      <h2 class="text-5xl font-bold text-white mb-6">Create your own Project</h2>
      <p class="text-xl text-white mb-8">Design and develop your unique web projects with ease.</p>
      <div class="flex gap-4 justify-center">

  </section>

  <!-- Main Section -->
  <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-16">

    <!-- Contact Section - Summer/Red/Yellow/Blue -->
    <section id="create" class="bg-gradient-to-r from-blue-400 via-red-400 to-yellow-400 p-8 rounded-lg">
      <h3 class="text-4xl font-bold text-white mb-8">Project Form</h3>
      <form class="max-w-2xl">
        <div class="mb-6">
          <label class="bg-white/0 block text-white font-bold mb-2 px-4">Name</label>
          <input type="text" class="bg-black/40 text-white placeholder:text-gray-900 w-full px-4 py-2 rounded border-none" placeholder="Your Name">
        </div>
        <div class="mb-6">
          <label class="bg-white/0 block text-white font-bold mb-2 px-4">Email</label>
          <input type="email" class="bg-black/40 text-white placeholder:text-gray-900 w-full px-4 py-2 rounded border-none" placeholder="Your Email">
        </div>
        <div class="mb-6">
          <label class="bg-white/0 block text-white font-bold mb-2 px-4">Project Description</label>
          <textarea class="bg-black/40 text-white placeholder:text-gray-900 w-full px-4 py-2 rounded border-none" rows="5" placeholder="Describe your project"></textarea>
        </div>
        <button type="submit" class="bg-black/80 text-blue-600 font-bold py-3 px-6 rounded hover:bg-gray-100">Send Message</button>
      </form>
    </section>

  </main>

  <!-- Footer Section -->
  <footer class="bg-gray-900 text-white text-center py-8 mt-16">
    <p>&copy; 2026 Marnus Du Toit. All rights reserved.</p>
  </footer>

</body>
</html>
